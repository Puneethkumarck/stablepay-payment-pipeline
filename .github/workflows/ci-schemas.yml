name: CI — Schemas

on:
  pull_request:
    paths:
      - 'schemas/**'
      - 'packages/schemas-py/**'
      - 'apps/**/build.gradle.kts'
      - 'buildSrc/**'
      - 'gradle/**'
  push:
    branches: [main]
    paths:
      - 'schemas/**'
      - 'packages/schemas-py/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Compile Avro schemas (Java codegen)
        run: ./gradlew :schemas:generateAvroJava :schemas:compileJava

      - name: Regenerate Python schemas
        run: uv run scripts/regen-py-schemas.py

      - name: Codegen drift check
        run: |
          if ! git diff --exit-code -- schemas/ packages/schemas-py/src/_generated/; then
            echo "::error::Generated code is out of sync. Run 'just regenerate-schemas' and commit."
            exit 1
          fi

      - name: Validate schema fixtures (JSON syntax)
        run: |
          find schemas/fixtures -name '*.json' -exec python3 -c "
          import json, sys
          for f in sys.argv[1:]:
              try:
                  json.load(open(f))
              except Exception as e:
                  print(f'FAIL: {f}: {e}')
                  sys.exit(1)
          " {} +
