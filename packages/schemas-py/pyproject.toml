[project]
name = "stablepay-schemas-py"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "dataclasses-avroschema>=0.65.0",
    "pydantic>=2.10.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/stablepay_schemas", "src/_generated"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
