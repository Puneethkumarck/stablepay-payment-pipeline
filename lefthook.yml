commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks protect --staged --no-banner
    ruff-format:
      glob: "*.py"
      run: ruff format --check {staged_files}
      exclude: "packages/schemas-py/src/_generated/"
    trailing-whitespace:
      run: "git diff --cached --check -- . ':!gradlew.bat'"
