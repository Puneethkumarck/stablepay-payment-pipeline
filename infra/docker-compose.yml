name: stablepay

services:
  # ─── Kafka (KRaft single broker+controller) ────────
  kafka:
    image: apache/kafka:4.0.2
    container_name: stablepay-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_LOG_RETENTION_MS: 604800000
      KAFKA_COMPRESSION_TYPE: zstd
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - stablepay_default

  # ─── Schema Registry ──────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.0
    container_name: stablepay-schema-registry
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD
    depends_on:
      kafka:
        condition: service_healthy
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - stablepay_default

  # ─── Postgres 17 ──────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: stablepay-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stablepay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stablepay_dev}
      POSTGRES_DB: ${POSTGRES_DB:-stablepay}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stablepay}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stablepay_default

  # ─── MinIO ────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: stablepay-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stablepay_default

  # ─── Flink JobManager ──────────────────────────────
  flink-jobmanager:
    image: flink:2.0.0-java21
    container_name: stablepay-flink-jobmanager
    ports:
      - "8082:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend.type: rocksdb
        state.checkpoints.dir: s3://flink-checkpoints/checkpoints
        state.savepoints.dir: s3://flink-savepoints/savepoints
        s3.endpoint: http://minio:9000
        s3.access-key: ${MINIO_ROOT_USER:-minioadmin}
        s3.secret-key: ${MINIO_ROOT_PASSWORD:-minioadmin123}
        s3.path.style.access: true
        execution.checkpointing.interval: 60s
        execution.checkpointing.min-pause: 30s
        state.checkpoints.num-retained: 3
        restart-strategy.type: fixed-delay
        restart-strategy.fixed-delay.attempts: 3
        restart-strategy.fixed-delay.delay: 30s
        taskmanager.numberOfTaskSlots: 5
    volumes:
      - flink_data:/opt/flink/data
    mem_limit: 512m
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/overview || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - stablepay_default

  # ─── Flink TaskManager ────────────────────────────
  flink-taskmanager:
    image: flink:2.0.0-java21
    container_name: stablepay-flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend.type: rocksdb
        state.checkpoints.dir: s3://flink-checkpoints/checkpoints
        state.savepoints.dir: s3://flink-savepoints/savepoints
        s3.endpoint: http://minio:9000
        s3.access-key: ${MINIO_ROOT_USER:-minioadmin}
        s3.secret-key: ${MINIO_ROOT_PASSWORD:-minioadmin123}
        s3.path.style.access: true
        taskmanager.numberOfTaskSlots: 5
        taskmanager.memory.process.size: 2048m
    volumes:
      - flink_data:/opt/flink/data
    mem_limit: 2048m
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    networks:
      - stablepay_default

  # ─── OpenSearch ───────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: stablepay-opensearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - stablepay_default

  # ─── Trino ────────────────────────────────────────
  trino:
    image: trinodb/trino:471
    container_name: stablepay-trino
    ports:
      - "8083:8080"
    volumes:
      - ./trino/etc:/etc/trino
      - trino_data:/data/trino
    mem_limit: 2g
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/info || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - stablepay_default

  # ─── Superset ────────────────────────────────────
  superset:
    build:
      context: ./superset
    image: stablepay/superset:4.1.2
    container_name: stablepay-superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: stablepay-dev-secret-key-not-for-production
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://stablepay:stablepay_dev@postgres:5432/superset
      SUPERSET_CONFIG_PATH: /app/superset-config/superset_config.py
    volumes:
      - ./superset:/app/superset-config
    mem_limit: 1g
    depends_on:
      postgres:
        condition: service_healthy
      trino:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - stablepay_default

  # ─── Lakehouse Maintenance Jobs ───────────────────
  lakehouse-jobs:
    build:
      context: ../apps/lakehouse-jobs
    container_name: stablepay-lakehouse-jobs
    environment:
      STBLPAY_TRINO_HOST: trino
      STBLPAY_TRINO_PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-stablepay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stablepay_dev}
    volumes:
      - lakehouse_backups:/data/backups
    mem_limit: 256m
    depends_on:
      trino:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - stablepay_default

  # ─── MinIO bucket init (one-shot) ─────────────────
  minio-init:
    image: minio/mc:latest
    container_name: stablepay-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb -p local/warehouse;
      mc mb -p local/flink-checkpoints;
      mc mb -p local/flink-savepoints;
      mc mb -p local/dlq-archive;
      echo 'Buckets created successfully';
      exit 0;
      "
    networks:
      - stablepay_default

volumes:
  kafka_data:
  postgres_data:
  minio_data:
  flink_data:
  opensearch_data:
  lakehouse_backups:
  trino_data:

networks:
  stablepay_default:
    driver: bridge
