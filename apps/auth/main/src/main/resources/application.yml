spring:
  application:
    name: stablepay-auth
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/stablepay_auth}
    username: ${AUTH_DB_USERNAME:stablepay}
    password: ${AUTH_DB_PASSWORD:stablepay}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${AUTH_PORT:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
