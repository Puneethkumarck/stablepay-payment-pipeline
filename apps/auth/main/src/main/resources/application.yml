spring:
  application:
    name: stablepay-auth
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/stablepay_auth}
    username: ${AUTH_DB_USERNAME:stablepay}
    password: ${AUTH_DB_PASSWORD:stablepay}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    open-in-view: false

server:
  port: ${AUTH_PORT:9000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
